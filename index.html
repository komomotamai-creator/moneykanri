<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>支出入管理</title>

<style>

:root{
  --bg:#f2f2f7;
  --card:#fff;
  --line:#e5e5ea;
  --text:#111;
  --sub:#777;
  --plus:#34c759;
  --minus:#ff3b30;
}

@media (prefers-color-scheme: dark){

  :root{
    --bg:#000;
    --card:#1c1c1e;
    --line:#2c2c2e;
    --text:#fff;
    --sub:#aaa;
  }

}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  padding:
    env(safe-area-inset-top)
    12px
    calc(90px + env(safe-area-inset-bottom));
}

.container{
  max-width:430px;
  margin:auto;
}

h1{
  font-size:24px;
  margin:10px 4px 16px;
}

.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

thead{
  position:sticky;
  top:0;
  z-index:5;
}

th{
  font-size:11px;
  color:var(--sub);
  padding:10px 6px;
  background:var(--card);
  border-bottom:1px solid var(--line);
}

td{
  border-bottom:1px solid var(--line);
  padding:10px 6px;
  font-size:13px;
}

tr:last-child td{
  border-bottom:none;
}

input,select{
  width:100%;
  border:none;
  background:transparent;
  outline:none;
  color:var(--text);
  font-size:13px;
}

.amount input{
  text-align:right;
  font-weight:700;
}

.balance{
  text-align:right;
  font-weight:700;
  white-space:nowrap;
}

.plus{
  color:var(--plus);
}

.minus{
  color:var(--minus);
}

.bottomBar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  padding:
    12px
    16px
    calc(12px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(20px);
}

@media (prefers-color-scheme: dark){

  .bottomBar{
    background:rgba(28,28,30,0.8);
  }

}

.addBtn{
  width:100%;
  max-width:430px;
  margin:auto;
  display:block;
  border:none;
  border-radius:16px;
  padding:16px;
  background:#007aff;
  color:white;
  font-size:17px;
  font-weight:700;
}

.summary{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}

.summaryLabel{
  font-size:12px;
  color:var(--sub);
  margin-bottom:6px;
}

.summaryValue{
  font-size:24px;
  font-weight:700;
}

.typeSelect{
  font-size:12px;
  padding:0;
}

</style>
</head>

<body>

<div class="container">

  <h1>支出入管理</h1>

  <div class="summary">
    <div class="summaryLabel">現在残高</div>
    <div class="summaryValue" id="totalBalance">0円</div>
  </div>

  <div class="card">

    <table>

      <thead>
        <tr>
          <th>日付</th>
          <th>項目</th>
          <th>種別</th>
          <th>金額</th>
          <th>残高</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>

    </table>

  </div>

</div>

<div class="bottomBar">
  <button class="addBtn" onclick="addRow()">
    ＋ 追加
  </button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("moneyData")) || [

  {
    date:"5/17",
    item:"開始残高",
    type:"即時",
    amount:250086
  },

  {
    date:"5/20",
    item:"スーパー",
    type:"LIFE",
    amount:-5000
  },

  {
    date:"5/21",
    item:"Amazon",
    type:"NL",
    amount:-12000
  },

  {
    date:"5/22",
    item:"コンビニ",
    type:"d",
    amount:-800
  },

  {
    date:"5/26",
    item:"LIFE引落",
    type:"即時",
    amount:-22526
  },

  {
    date:"5/27",
    item:"三井住友引落",
    type:"即時",
    amount:-113457
  },

  {
    date:"6/10",
    item:"dカード引落",
    type:"即時",
    amount:-9221
  }

];

function calculateBalances(){

  let balance = 0;

  let pending = {
    LIFE:0,
    NL:0,
    d:0
  };

  return data.map(row=>{

    let amount = Number(row.amount);

    // 即時反映
    if(row.type === "即時"){
      balance += amount;
    }

    // LIFE積立
    else if(row.type === "LIFE"){
      pending.LIFE += amount;
    }

    // NL積立
    else if(row.type === "NL"){
      pending.NL += amount;
    }

    // d積立
    else if(row.type === "d"){
      pending.d += amount;
    }

    // LIFE引落
    if(row.item.includes("LIFE引落")){
      balance += pending.LIFE;
      pending.LIFE = 0;
    }

    // 三井住友引落
    if(row.item.includes("三井住友引落")){
      balance += pending.NL;
      pending.NL = 0;
    }

    // dカード引落
    if(row.item.includes("dカード引落")){
      balance += pending.d;
      pending.d = 0;
    }

    return balance;

  });

}

function renderTable(){

  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  const balances = calculateBalances();

  data.forEach((row,index)=>{

    const cls = row.amount >= 0
      ? "plus"
      : "minus";

    const tr = document.createElement("tr");

    tr.innerHTML = `

      <td>
        <input
          value="${row.date}"
          onchange="updateRow(${index},'date',this.value)">
      </td>

      <td>
        <input
          value="${row.item}"
          onchange="updateRow(${index},'item',this.value)">
      </td>

      <td>
        <select
          class="typeSelect"
          onchange="updateRow(${index},'type',this.value)">

          <option value="即時"
            ${row.type==="即時"?"selected":""}>
            即時
          </option>

          <option value="LIFE"
            ${row.type==="LIFE"?"selected":""}>
            LIFE
          </option>

          <option value="NL"
            ${row.type==="NL"?"selected":""}>
            NL
          </option>

          <option value="d"
            ${row.type==="d"?"selected":""}>
            d
          </option>

        </select>
      </td>

      <td class="amount ${cls}">
        <input
          type="number"
          value="${row.amount}"
          onchange="updateRow(${index},'amount',this.value)">
      </td>

      <td class="balance">
        ${balances[index].toLocaleString()}円
      </td>

    `;

    tbody.appendChild(tr);

  });

  document.getElementById("totalBalance").innerText =
    balances[balances.length - 1].toLocaleString() + "円";

  saveData();

}

function updateRow(index,key,value){

  if(key === "amount"){
    data[index][key] = Number(value);
  }else{
    data[index][key] = value;
  }

  renderTable();

}

function addRow(){

  data.push({
    date:"",
    item:"",
    type:"即時",
    amount:0
  });

  renderTable();

}

function saveData(){

  localStorage.setItem(
    "moneyData",
    JSON.stringify(data)
  );

}

renderTable();

</script>

</body>
</html>
