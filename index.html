<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>支出入管理</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#f5f5f5;
  padding:20px;
  color:#333;
}

.container{
  max-width:900px;
  margin:auto;
}

h1{
  margin-bottom:20px;
}

.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border-bottom:1px solid #eee;
  padding:14px;
  text-align:left;
  font-size:18px;
}

th{
  background:#fafafa;
}

input{
  width:100%;
  border:none;
  font-size:18px;
  background:transparent;
  outline:none;
}

.amount.minus{
  color:#d33;
  font-weight:bold;
}

.amount.plus{
  color:#0a8a3a;
  font-weight:bold;
}

.balance{
  font-weight:bold;
}

button{
  margin-top:20px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#333;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
  <h1>支出入管理</h1>

  <div class="card">
    <table id="moneyTable">
      <thead>
        <tr>
          <th>日付</th>
          <th>項目</th>
          <th>支出入</th>
          <th>残高</th>
        </tr>
      </thead>

      <tbody id="tableBody">
      </tbody>
    </table>

    <button onclick="addRow()">＋ 行を追加</button>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("moneyData")) || [
  {date:"5/17", item:"初期残高", amount:250086},
  {date:"5/26", item:"LIFE", amount:-22526},
  {date:"5/27", item:"三井住友", amount:-113457},
  {date:"6/10", item:"dカード", amount:-9221},
  {date:"6/15", item:"給料", amount:200000},
];

function renderTable(){

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let balance = 0;

  data.forEach((row,index)=>{

    balance += Number(row.amount);

    const tr = document.createElement("tr");

    const amountClass = row.amount >= 0 ? "plus" : "minus";

    tr.innerHTML = `
      <td>
        <input value="${row.date}"
          onchange="updateRow(${index}, 'date', this.value)">
      </td>

      <td>
        <input value="${row.item}"
          onchange="updateRow(${index}, 'item', this.value)">
      </td>

      <td class="amount ${amountClass}">
        <input type="number"
          value="${row.amount}"
          onchange="updateRow(${index}, 'amount', this.value)">
      </td>

      <td class="balance">
        ${balance.toLocaleString()} 円
      </td>
    `;

    tbody.appendChild(tr);
  });

  saveData();
}

function updateRow(index,key,value){

  if(key === "amount"){
    data[index][key] = Number(value);
  }else{
    data[index][key] = value;
  }

  renderTable();
}

function addRow(){

  data.push({
    date:"",
    item:"",
    amount:0
  });

  renderTable();
}

function saveData(){
  localStorage.setItem("moneyData", JSON.stringify(data));
}

renderTable();

</script>

</body>
</html>
