<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>支出入管理</title>

<style>

:root{
  --bg:#f2f2f7;
  --card:#ffffff;
  --line:#e5e5ea;
  --text:#111;
  --sub:#777;
  --minus:#ff3b30;
  --plus:#34c759;
}

@media (prefers-color-scheme: dark){

  :root{
    --bg:#000;
    --card:#1c1c1e;
    --line:#2c2c2e;
    --text:#fff;
    --sub:#aaa;
  }

}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--text);

  padding:
    env(safe-area-inset-top)
    12px
    calc(90px + env(safe-area-inset-bottom))
    12px;
}

.container{
  max-width:430px;
  margin:auto;
}

h1{
  font-size:26px;
  margin:8px 4px 16px;
  font-weight:700;
}

.summary{
  margin-bottom:14px;
}

.summaryCard{
  background:var(--card);
  border-radius:16px;
  padding:14px;
  border:1px solid var(--line);
}

.summaryLabel{
  font-size:12px;
  color:var(--sub);
  margin-bottom:6px;
}

.summaryValue{
  font-size:20px;
  font-weight:700;
}

.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  border:1px solid var(--line);
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  position:sticky;
  top:0;
  z-index:10;
}

th{
  background:var(--card);
  color:var(--sub);
  font-size:12px;
  font-weight:600;
  padding:12px 8px;
  border-bottom:1px solid var(--line);
}

tbody tr{
  border-bottom:1px solid var(--line);
}

tbody tr:last-child{
  border-bottom:none;
}

input{
  width:100%;
  border:none;
  background:transparent;
  outline:none;
  color:var(--text);
  font-size:14px;
  padding:0;
}

.amount input{
  text-align:right;
  font-weight:700;
}

.balance{
  text-align:right;
  font-weight:700;
  white-space:nowrap;
}

.minus input{
  color:var(--minus);
}

.plus input{
  color:var(--plus);
}

.rowGrid{

  display:grid;

  grid-template-columns:
    70px
    1fr
    100px
    100px;

  align-items:center;

  min-height:68px;

  padding:0 8px;

  background:var(--card);

}

.swipeRow{
  position:relative;
  z-index:2;
  background:var(--card);
  transition:transform .2s ease;
}

.deleteBackground{

  position:absolute;

  top:0;
  right:0;
  bottom:0;

  width:100px;

  background:#ff3b30;

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;
  font-weight:700;

  z-index:1;

}

.dragging{
  opacity:.5;
}

.bottomBar{

  position:fixed;

  left:0;
  right:0;
  bottom:0;

  padding:
    12px
    16px
    calc(12px + env(safe-area-inset-bottom));

  background:rgba(255,255,255,0.8);

  backdrop-filter:blur(20px);

}

@media (prefers-color-scheme: dark){

  .bottomBar{
    background:rgba(28,28,30,0.8);
  }

}

.addBtn{

  width:100%;
  max-width:430px;

  margin:auto;
  display:block;

  border:none;

  border-radius:16px;

  padding:16px;

  font-size:17px;
  font-weight:700;

  background:#007aff;
  color:white;

}

</style>
</head>

<body>

<div class="container">

  <h1>支出入管理</h1>

  <div class="summary">

    <div class="summaryCard">

      <div class="summaryLabel">
        最終残高
      </div>

      <div class="summaryValue" id="totalBalance">
        0円
      </div>

    </div>

  </div>

  <div class="card">

    <table>

      <thead>
        <tr>
          <th>日付</th>
          <th>項目</th>
          <th>支出入</th>
          <th>残高</th>
        </tr>
      </thead>

      <tbody id="tableBody"></tbody>

    </table>

  </div>

</div>

<div class="bottomBar">

  <button class="addBtn" onclick="addRow()">
    ＋ 追加
  </button>

</div>

<script>

let data = JSON.parse(
  localStorage.getItem("moneyData")
) || [

  {
    date:"5/17",
    item:"初期残高",
    amount:250086
  },

  {
    date:"5/26",
    item:"三井住友",
    amount:-22526
  },

  {
    date:"5/27",
    item:"LIFE",
    amount:-113457
  },

  {
    date:"6/10",
    item:"dカード",
    amount:-9221
  },

  {
    date:"6/15",
    item:"給料",
    amount:200000
  }

];

function renderTable(){

  const tbody =
    document.getElementById("tableBody");

  tbody.innerHTML = "";

  let balance = 0;

  data.forEach((row,index)=>{

    balance += Number(row.amount);

    const amountClass =
      row.amount >= 0
      ? "plus"
      : "minus";

    const tr =
      document.createElement("tr");

    tr.draggable = true;

    tr.innerHTML = `

      <td colspan="4"
        style="
          padding:0;
          position:relative;
          overflow:hidden;
        ">

        <div class="deleteBackground">
          削除
        </div>

        <div class="swipeRow">

          <div class="rowGrid">

            <div>

              <input
                value="${row.date}"
                onchange="
                  updateRow(
                    ${index},
                    'date',
                    this.value
                  )
                ">

            </div>

            <div>

              <input
                value="${row.item}"
                onchange="
                  updateRow(
                    ${index},
                    'item',
                    this.value
                  )
                ">

            </div>

            <div class="amount ${amountClass}">

              <input
                type="number"

                value="${row.amount}"

                onchange="
                  updateRow(
                    ${index},
                    'amount',
                    this.value
                  )
                ">

            </div>

            <div class="balance">
              ${balance.toLocaleString()}円
            </div>

          </div>

        </div>

      </td>

    `;

    tbody.appendChild(tr);

    setupSwipe(tr,index);

    setupDrag(tr,index);

  });

  document.getElementById(
    "totalBalance"
  ).innerText =
    balance.toLocaleString() + "円";

  saveData();

}

function setupSwipe(tr,index){

  const swipeRow =
    tr.querySelector(".swipeRow");

  let startX = 0;
  let currentX = 0;

  swipeRow.addEventListener(
    "touchstart",
    (e)=>{

      startX =
        e.touches[0].clientX;

    }
  );

  swipeRow.addEventListener(
    "touchmove",
    (e)=>{

      currentX =
        e.touches[0].clientX;

      const diff =
        currentX - startX;

      if(diff < 0){

        swipeRow.style.transform =
          `translateX(${diff}px)`;

      }

    }
  );

  swipeRow.addEventListener(
    "touchend",
    ()=>{

      const diff =
        currentX - startX;

      if(diff < -100){

        if(confirm("削除しますか？")){

          data.splice(index,1);

          renderTable();

        }

      }else{

        swipeRow.style.transform =
          "translateX(0px)";

      }

    }
  );

}

let dragIndex = null;

function setupDrag(tr,index){

  tr.addEventListener(
    "dragstart",
    ()=>{

      dragIndex = index;

      tr.classList.add("dragging");

    }
  );

  tr.addEventListener(
    "dragend",
    ()=>{

      tr.classList.remove("dragging");

    }
  );

  tr.addEventListener(
    "dragover",
    (e)=>{

      e.preventDefault();

    }
  );

  tr.addEventListener(
    "drop",
    ()=>{

      if(dragIndex === null)
        return;

      const movedItem =
        data.splice(
          dragIndex,
          1
        )[0];

      data.splice(
        index,
        0,
        movedItem
      );

      renderTable();

    }
  );

}

function updateRow(index,key,value){

  if(key === "amount"){

    data[index][key] =
      Number(value);

  }else{

    data[index][key] =
      value;

  }

  renderTable();

}

function addRow(){

  data.push({

    date:"",
    item:"",
    amount:0

  });

  renderTable();

}

function saveData(){

  localStorage.setItem(
    "moneyData",
    JSON.stringify(data)
  );

}

renderTable();

</script>

</body>
</html>
